<section class="flex min-h-screen bg-white">
    <div class="hidden lg:flex flex-col justify-center items-center relative w-1/2 px-12 bg-cover bg-center"
        style="background-image: url('/home-bg.png')">

        <div class="absolute inset-0 bg-blue-900/40 backdrop-blur-[2px]"></div>

        <div class="relative z-10 text-center">
            <h1 class="text-4xl xl:text-5xl text-white font-extrabold tracking-tight leading-tight">
                Bem-vindo(a) de volta ao <br>
                <span class="text-blue-200">seu Espaço de Trabalho</span>
            </h1>
            <p class="mt-6 text-lg text-blue-50 max-w-md mx-auto leading-relaxed">
                Gerencie suas tarefas de forma eficiente e organize seu dia com total facilidade.
            </p>
        </div>
    </div>

    <div class="w-full lg:w-1/2 flex flex-col justify-center items-center p-8 sm:p-12">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-slate-800">Acesse sua conta</h2>
                <p class="text-slate-500 mt-2">Informe seus dados para continuar</p>
            </div>

            <form action="#" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
                    <input type="email"
                        class="w-full rounded-xl border-2 border-transparent bg-slate-100 p-4 outline-none transition-all focus:bg-white focus:border-blue-500 placeholder:text-slate-400"
                        placeholder="exemplo@email.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Senha</label>
                    <input type="password"
                        class="w-full rounded-xl border-2 border-transparent bg-slate-100 p-4 outline-none transition-all focus:bg-white focus:border-blue-500 placeholder:text-slate-400"
                        placeholder="••••••••">
                </div>

                <div class="flex items-center justify-between py-2">
                    <p class="text-sm text-slate-600">
                        Não tem conta?
                        <a href="#"
                            class="font-bold text-blue-600 hover:text-blue-700 transition-colors">Cadastre-se</a>
                    </p>
                    <a href="#" class="text-sm font-medium text-blue-600 hover:underline">Esqueceu a senha?</a>
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5 active:scale-[0.98] cursor-pointer">
                    Entrar no Sistema
                </button>
            </form>

            <p class="mt-12 text-center text-sm text-slate-400">
                &copy; 2026 TaskMan. Todos os direitos reservados.
            </p>
        </div>
    </div>
</section>
